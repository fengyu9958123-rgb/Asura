name: aicase

services:
  aicase:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        AICASE_BASE_IMAGE: "${AICASE_BASE_IMAGE:-python:3.11-slim-bookworm}"
        AICASE_PIP_INDEX_URL: "${AICASE_PIP_INDEX_URL:-}"
        AICASE_APT_MIRROR: "${AICASE_APT_MIRROR:-}"
        AICASE_APT_SECURITY_MIRROR: "${AICASE_APT_SECURITY_MIRROR:-}"
    image: aicase:latest
    container_name: "${AICASE_CONTAINER_NAME:-aicase}"
    restart: unless-stopped
    ports:
      - "${AICASE_PORT:-5002}:5002"
    environment:
      FLASK_ENV: development
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      LOG_DIR: /app/logs
      SHOW_AI_COLLABORATION: "${SHOW_AI_COLLABORATION:-True}"
      UPLOAD_FOLDER: /app/uploads
      AUTOGEN_CONFIG_PATH: /app/config/OAI_CONFIG_LIST
    volumes:
      - ${AICASE_DATA_DIR:-./runtime}/data:/app/data
      - ${AICASE_DATA_DIR:-./runtime}/uploads:/app/uploads
      - ${AICASE_DATA_DIR:-./runtime}/outputs:/app/outputs
      - ${AICASE_DATA_DIR:-./runtime}/logs:/app/logs
      - ${AICASE_DATA_DIR:-./runtime}/config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
